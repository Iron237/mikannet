# Mikannet — app + qBittorrent
#
# 迁移到 NAS 本机 Docker 时:只需把 downloads 卷的来源从 CIFS 改为本地路径,
# 容器内路径(/downloads、/config)保持不变,数据库记录的相对路径不失效。
#
# 注意(P0 探针结论):qB 5.x 强制 Host 头端口校验,
# WEBUI_PORT 必须与宿主映射端口一致(此处统一 18080)。
services:
  mikannet:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      # 构建期 apt/pip 默认用清华镜像直连(见 Dockerfile ARG,可覆盖)
    container_name: mikannet
    # 首次向导「NAS/SMB 共享」模式 = App 在容器内自挂载 SMB(storage.py 的 mount() 系统调用),
    # 需要这两项授权,否则报「挂载失败: Operation not permitted (errno 1)」。
    # (compose 托管的 CIFS 卷由守护进程挂,不需要这些;两种方式都加上无害。)
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    ports:
      # winnat 动态保留段每次重启重排,8008/8014/8099 都可能被划进去导致 bind 失败。
      # 宿主端口改用 .env 的 HOST_PORT 一行可改(默认 9000);若仍冲突换个数字再 up -d 即可,
      # 或管理员跑 `net stop winnat & net start winnat` 释放保留段后再起。
      - "${HOST_PORT:-9000}:8008"
    environment:
      # dev:同版本号重建镜像后,wrapper 强制把卷代码刷成新构建(生产/发布包不设此项)
      MIKANNET_DEV_RESEED: "1"
      MIKANNET_PROXY_URL: ${PROXY_URL:-}
      MIKANNET_TMDB_API_KEY: ${TMDB_API_KEY:-}
      # 下载器后端:bitcomet | qb(改 .env 的 DOWNLOADER + 重启即切换)
      MIKANNET_DOWNLOADER: ${DOWNLOADER:-bitcomet}
      # qB 连接目标:容器内用 qbittorrent:18080;接桌面 qB 则用 host.docker.internal:<端口>
      MIKANNET_QB_HOST: ${QB_HOST:-qbittorrent}
      MIKANNET_QB_PORT: "${QB_PORT:-18080}"
      MIKANNET_QB_USERNAME: ${QB_USER:-admin}
      MIKANNET_QB_PASSWORD: ${QB_PASS:-adminadmin}
      # 下载器写盘根目录(接桌面 qB 时改成 NAS 的 Windows 路径;mikannet 仍从 /downloads 读同一份)
      MIKANNET_DOWNLOAD_ROOT: ${DOWNLOAD_ROOT:-/downloads}
      MIKANNET_POLL_INTERVAL_MIN: ${POLL_INTERVAL_MIN:-15}
      # 完整更新(换镜像):helper 需要 compose 项目名 + 宿主上的 compose 目录(daemon 视角)
      MIKANNET_COMPOSE_PROJECT: ${COMPOSE_PROJECT_NAME:-rssvideo}
      MIKANNET_COMPOSE_HOST_DIR: ${PWD}
      # 部署带 override 时(deploy.sh local)在此透传同一组 -f 文件(逗号分隔),
      # 否则 helper 重建只按默认发现基础文件 → 卷定义与原部署漂移
      MIKANNET_COMPOSE_FILES: ${COMPOSE_FILES_LIST:-}
      # 本地导入源的主机路径前缀(用于把粘贴的 Win/NAS 路径翻译成容器内 /import、/import-nas)
      MIKANNET_IMPORT_WIN_HOST: ${LOCAL_IMPORT_PATH:-./import}
      MIKANNET_IMPORT_NAS_HOST: ${NAS_IMPORT_PATH:-//192.168.2.4/Minecraft 独行侠/番剧}
      # mikannet 下载目录的 NAS 路径;若在 NAS_IMPORT_PATH 之下,NAS→NAS 导入走服务器端 rename
      MIKANNET_NAS_SMB_PATH: ${NAS_SMB_PATH}
    volumes:
      - ./data/mikannet:/config
      # 自更新代码卷:wrapper 从 /code/current 跑应用,多版本并存可回滚(用命名卷=ext4,symlink 可靠)
      - code:/code
      # 完整更新:挂 docker.sock(=宿主 root 等价权限,信任权衡见 ADR-0005/README)+ compose 目录只读
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/compose:ro
      - downloads:/downloads
      # 本地番剧导入源:/import = Windows 本机磁盘(.env LOCAL_IMPORT_PATH,可填 G:/Anime 等)
      - ${LOCAL_IMPORT_PATH:-./import}:/import
      # /import-nas = NAS 上的旧番剧目录(.env NAS_IMPORT_PATH,CIFS 挂载)
      - nas_import:/import-nas
      # /bd-owned = 已购原盘目录(BD 收藏,.env BD_OWNED_PATH,CIFS;不需要可删此行+下方卷)
      - bd_owned:/bd-owned
    restart: unless-stopped
  # 下载器已迁移到桌面 qBittorrent(host.docker.internal:19897),
  # 原 Docker qBittorrent 服务已移除(同 BitComet)。app 仍挂 downloads 卷读 NAS 上的成品文件。

volumes:
  # 自更新代码卷(命名卷,存于 WSL2 VM 的 ext4,symlink/原子重指可靠)
  code:
    driver: local
  downloads:
    # 当前阶段:Win PC Docker 直写 NAS 的 SMB 共享(CIFS)
    # 迁移 NAS 后:删掉 driver_opts,换成 driver: local + 本地路径绑定
    driver: local
    driver_opts:
      type: cifs
      o: "username=${NAS_USER},password=${NAS_PASS},uid=1000,gid=1000,iocharset=utf8,vers=3.0,noserverino"
      device: "${NAS_SMB_PATH}"
  # NAS 上的旧番剧导入源(CIFS,只读扫描用;NAS_IMPORT_PATH 指向你 NAS 上存旧番剧的目录)
  nas_import:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${NAS_USER},password=${NAS_PASS},uid=1000,gid=1000,iocharset=utf8,vers=3.0,noserverino"
      device: "${NAS_IMPORT_PATH:-//192.168.2.4/Minecraft 独行侠/番剧}"
  # 已购原盘目录(BD 收藏:MAKEMKV 原盘等;CIFS 只读扫描。路径不存在请删掉它与上方挂载行)
  bd_owned:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${NAS_USER},password=${NAS_PASS},uid=1000,gid=1000,iocharset=utf8,vers=3.0,noserverino"
      device: "${BD_OWNED_PATH:-//192.168.2.4/Minecraft 独行侠/BD/已购BD翻录}"
