# Mikanarr — app + qBittorrent
#
# 迁移到 NAS 本机 Docker 时:只需把 downloads 卷的来源从 CIFS 改为本地路径,
# 容器内路径(/downloads、/config)保持不变,数据库记录的相对路径不失效。
#
# 注意(P0 探针结论):qB 5.x 强制 Host 头端口校验,
# WEBUI_PORT 必须与宿主映射端口一致(此处统一 18080)。
services:
  mikanarr:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      # 构建期 apt/pip 默认用清华镜像直连(见 Dockerfile ARG,可覆盖)
    container_name: mikanarr
    ports:
      - "8008:8008"
    environment:
      MIKANARR_PROXY_URL: ${PROXY_URL:-}
      MIKANARR_TMDB_API_KEY: ${TMDB_API_KEY:-}
      # 下载器后端:bitcomet | qb(改 .env 的 DOWNLOADER + 重启即切换)
      MIKANARR_DOWNLOADER: ${DOWNLOADER:-bitcomet}
      # qB 连接目标:容器内用 qbittorrent:18080;接桌面 qB 则用 host.docker.internal:<端口>
      MIKANARR_QB_HOST: ${QB_HOST:-qbittorrent}
      MIKANARR_QB_PORT: "${QB_PORT:-18080}"
      MIKANARR_QB_USERNAME: ${QB_USER:-admin}
      MIKANARR_QB_PASSWORD: ${QB_PASS:-adminadmin}
      # 下载器写盘根目录(接桌面 qB 时改成 NAS 的 Windows 路径;mikanarr 仍从 /downloads 读同一份)
      MIKANARR_DOWNLOAD_ROOT: ${DOWNLOAD_ROOT:-/downloads}
      MIKANARR_POLL_INTERVAL_MIN: ${POLL_INTERVAL_MIN:-15}
      # 本地导入源的主机路径前缀(用于把粘贴的 Win/NAS 路径翻译成容器内 /import、/import-nas)
      MIKANARR_IMPORT_WIN_HOST: ${LOCAL_IMPORT_PATH:-./import}
      MIKANARR_IMPORT_NAS_HOST: ${NAS_IMPORT_PATH:-//192.168.2.4/Minecraft 独行侠/番剧}
      # mikanarr 下载目录的 NAS 路径;若在 NAS_IMPORT_PATH 之下,NAS→NAS 导入走服务器端 rename
      MIKANARR_NAS_SMB_PATH: ${NAS_SMB_PATH}
    volumes:
      - ./data/mikanarr:/config
      - downloads:/downloads
      # 本地番剧导入源:/import = Windows 本机磁盘(.env LOCAL_IMPORT_PATH,可填 G:/Anime 等)
      - ${LOCAL_IMPORT_PATH:-./import}:/import
      # /import-nas = NAS 上的旧番剧目录(.env NAS_IMPORT_PATH,CIFS 挂载)
      - nas_import:/import-nas
      # /bd-owned = 已购原盘目录(BD 收藏,.env BD_OWNED_PATH,CIFS;不需要可删此行+下方卷)
      - bd_owned:/bd-owned
    restart: unless-stopped
  # 下载器已迁移到桌面 qBittorrent(host.docker.internal:19897),
  # 原 Docker qBittorrent 服务已移除(同 BitComet)。app 仍挂 downloads 卷读 NAS 上的成品文件。

volumes:
  downloads:
    # 当前阶段:Win PC Docker 直写 NAS 的 SMB 共享(CIFS)
    # 迁移 NAS 后:删掉 driver_opts,换成 driver: local + 本地路径绑定
    driver: local
    driver_opts:
      type: cifs
      o: "username=${NAS_USER},password=${NAS_PASS},uid=1000,gid=1000,iocharset=utf8,vers=3.0,noserverino"
      device: "${NAS_SMB_PATH}"
  # NAS 上的旧番剧导入源(CIFS,只读扫描用;NAS_IMPORT_PATH 指向你 NAS 上存旧番剧的目录)
  nas_import:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${NAS_USER},password=${NAS_PASS},uid=1000,gid=1000,iocharset=utf8,vers=3.0,noserverino"
      device: "${NAS_IMPORT_PATH:-//192.168.2.4/Minecraft 独行侠/番剧}"
  # 已购原盘目录(BD 收藏:MAKEMKV 原盘等;CIFS 只读扫描。路径不存在请删掉它与上方挂载行)
  bd_owned:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${NAS_USER},password=${NAS_PASS},uid=1000,gid=1000,iocharset=utf8,vers=3.0,noserverino"
      device: "${BD_OWNED_PATH:-//192.168.2.4/Minecraft 独行侠/BD/已购BD翻录}"
